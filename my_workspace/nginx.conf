# MTSecurity v2 — nginx reverse proxy configuration
#
# Place this file at /etc/nginx/sites-available/mtsecurity
# then: sudo ln -s /etc/nginx/sites-available/mtsecurity /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Backend FastAPI running on 127.0.0.1:8000
#   - Frontend static files built to /var/www/mtsecurity (npm run build → dist/)
#   - Replace YOUR_DOMAIN or IP below

upstream mtsecurity_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # ── Static frontend ──────────────────────────────────────────────────────
    root /var/www/mtsecurity;
    index index.html;

    # Serve built Vue SPA — all non-file paths fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Cache hashed assets aggressively; index.html never cached
        location ~* \.(js|css|woff2?|ttf|ico|png|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://mtsecurity_api;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long-polling / SSE if added later
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Don't buffer API responses — stream them as they arrive
        proxy_buffering off;
    }

    # ── WebSocket ────────────────────────────────────────────────────────────
    location /api/v1/ws {
        proxy_pass         http://mtsecurity_api;
        proxy_http_version 1.1;

        # Required WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep WS connections alive for up to 1 hour
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Snapshot / clip static files served directly by nginx ───────────────
    # Faster than proxying through FastAPI for large binary files
    location /data/snapshots/ {
        alias /opt/mtsecurity/backend/data/snapshots/;
        expires 7d;
        add_header Cache-Control "public";

        # Only allow authenticated users — validate via auth_request if needed
        # For simplicity, paths are unguessable UUIDs (security by obscurity)
    }

    location /data/clips/ {
        alias /opt/mtsecurity/backend/data/clips/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Rate limiting (optional — handled by slowapi in app as well) ─────────
    # limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # location /api/v1/auth/login {
    #     limit_req zone=login burst=3 nodelay;
    #     proxy_pass http://mtsecurity_api;
    # }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mtsecurity_access.log;
    error_log  /var/log/nginx/mtsecurity_error.log warn;
}

