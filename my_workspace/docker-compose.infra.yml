# MTSecurity — Infrastructure Stack
# รัน: docker compose -f docker-compose.infra.yml up -d
# หยุด: docker compose -f docker-compose.infra.yml down
#
# ประกอบด้วย: PostgreSQL, Redis, Prometheus, Grafana
# ทุก service publish port ออกมาให้ native backend/frontend ใช้ได้

name: mtsecurity-infra

networks:
  infra:
    name: mtsecurity_infra    # shared network ที่ app compose จะ join ด้วย
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:

  postgres:
    image: postgres:16-alpine
    networks:
      - infra
    ports:
      - "5434:5432"           # native backend เชื่อมต่อ localhost:5434
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mtsecurity}
      POSTGRES_USER: ${POSTGRES_USER:-mtsecurity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtsecurity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - infra
    ports:
      - "6379:6379"           # native backend เชื่อมต่อ localhost:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:v2.51.0
    networks:
      - infra
    ports:
      - "9090:9090"           # Prometheus UI
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

  grafana:
    image: grafana/grafana:11.0.0
    networks:
      - infra
    ports:
      - "3000:3000"           # Grafana UI
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
