# Development overrides — applied automatically on top of docker-compose.yml
# ใช้สำหรับ: docker compose up -d  (ไม่ต้องระบุ file)

name: mtsecurity

services:

  backend:
    volumes:
      - ./backend:/app                             # hot-reload source mount
      - snapshots:/app/data/snapshots
      - clips:/app/data/clips
      - models:/app/data/models
      - ./backend/.env.docker:/app/.env:ro
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    mem_limit: 8g
    cpus: 4.0

  frontend:
    build:
      target: builder                              # node image (not nginx) for npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules                          # keep container node_modules separate
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_BACKEND_URL: http://backend:8000        # Vite proxy → backend container
    ports:
      - "5173:5173"
    mem_limit: 1g                                  # Vite needs ~400-600 MB
    cpus: 2.0

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/mtsecurity.dev.conf:/etc/nginx/conf.d/mtsecurity.conf:ro
