name: mtsecurity

services:

  backend:
    build:
      context: ./backend
      target: runtime
    volumes:
      - ./backend:/app
      - snapshots:/app/data/snapshots
      - clips:/app/data/clips
      - models:/app/data/models
      - ./backend/.env.docker:/app/.env:ro
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    mem_limit: 8g
    cpus: 4.0

  frontend:
    build:
      target: builder       # use node image, not nginx, so npm is available
    volumes:
      - ./frontend:/app
      - /app/node_modules   # anonymous volume keeps container node_modules
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    mem_limit: 1g           # Vite dev server needs ~400-600 MB
    cpus: 2.0

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/mtsecurity.dev.conf:/etc/nginx/conf.d/mtsecurity.conf:ro

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
