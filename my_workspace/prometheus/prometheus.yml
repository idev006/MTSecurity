global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: mtsecurity

scrape_configs:
  - job_name: mtsecurity-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /api/v1/metrics
    scrape_interval: 10s

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
