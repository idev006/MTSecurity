name: mtsecurity

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  snapshots:
  clips:
  models:
  grafana_data:
  prometheus_data:

services:

  postgres:
    image: postgres:16-alpine
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mtsecurity}
      POSTGRES_USER: ${POSTGRES_USER:-mtsecurity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtsecurity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.5

  backend:
    build:
      context: ./backend
      target: runtime
    networks:
      - internal
      - proxy
      - monitoring
    volumes:
      - snapshots:/app/data/snapshots
      - clips:/app/data/clips
      - models:/app/data/models
      - ./backend/.env.docker:/app/.env:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mtsecurity}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mtsecurity}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0

  frontend:
    build:
      context: ./frontend
      target: runtime
    networks:
      - proxy
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    networks:
      - proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:v2.51.0
    networks:
      - monitoring
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    mem_limit: 512m

  grafana:
    image: grafana/grafana:11.0.0
    networks:
      - monitoring
      - proxy
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 256m
