# MTSecurity — Application Stack
# ต้องรัน infra stack ก่อน: docker compose -f docker-compose.infra.yml up -d
# รัน: docker compose up -d
# รัน full stack: docker compose -f docker-compose.infra.yml -f docker-compose.yml up -d

name: mtsecurity

networks:
  # join shared infra network (สร้างโดย docker-compose.infra.yml)
  infra:
    name: mtsecurity_infra
    external: true
  proxy:
    driver: bridge

volumes:
  snapshots:
  clips:
  models:

services:

  backend:
    build:
      context: ./backend
      target: runtime
    networks:
      - infra      # เชื่อมต่อ postgres, redis ผ่าน service name
      - proxy      # เชื่อมต่อ frontend, nginx
    volumes:
      - snapshots:/app/data/snapshots
      - clips:/app/data/clips
      - models:/app/data/models
      - ./backend/.env.docker:/app/.env:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mtsecurity}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mtsecurity}
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0

  frontend:
    build:
      context: ./frontend
      target: runtime
    networks:
      - proxy
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    networks:
      - proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.5
