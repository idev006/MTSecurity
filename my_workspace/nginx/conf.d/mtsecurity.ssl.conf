# nginx config สำหรับ HTTPS (self-signed cert หรือ mkcert)
# ใช้แทน mtsecurity.native.conf เมื่อต้องการ HTTPS บน LAN
#
# วิธีเปิดใช้:
#   1. สร้าง cert ด้วย mkcert (ดู doc/HTTPS.md)
#   2. วาง cert ใน nginx/ssl/
#   3. แก้ docker-compose.infra.yml ให้ mount mtsecurity.ssl.conf แทน mtsecurity.native.conf
#   4. docker compose -f docker-compose.infra.yml up -d nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # SSL Certificates (mount ผ่าน volume: ./nginx/ssl:/etc/nginx/ssl:ro)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 10m;
    server_tokens off;

    # HSTS (เปิดหลัง test แล้วว่าใช้งานได้)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # MJPEG — long-lived, no buffering
    location ~* ^/api/v1/cameras/[0-9]+/stream {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket
    location /api/v1/ws {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }

    # API → native backend:8000
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Vite HMR WebSocket
    location /@vite/ {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Frontend → native Vite:5173
    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
