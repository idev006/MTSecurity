# nginx config สำหรับ native dev mode
# backend รันบน Windows host:8000 / frontend รันบน Windows host:5173
# Docker containers เข้าถึง host ผ่าน host.docker.internal

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    server_tokens off;

    # MJPEG — long-lived, no buffering
    location ~* ^/api/v1/cameras/[0-9]+/stream {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /api/v1/ws {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # API → native backend:8000
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Vite HMR WebSocket
    location /@vite/ {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Frontend → native Vite:5173
    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
